<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Redirecting...</title>
    <script>
      // GitHub Pages SPA fallback
      var path = location.pathname.replace('/my-react-app', '');
      location.replace('/my-react-app/?redirect=' + path);
    </script>
  </head>
  <body></body>
</html>
